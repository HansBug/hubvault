name: benchmark

on:
  workflow_dispatch:
    inputs:
      tier:
        description: Phase 12 benchmark execution tier
        required: true
        default: standard
        type: choice
        options:
          - smoke
          - standard
          - nightly
          - pressure
  schedule:
    - cron: "0 18 * * 0"

jobs:
  benchmark-smoke:
    if: ${{ github.event_name == 'schedule' || github.event.inputs.tier != 'pressure' }}
    name: benchmark smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt -r requirements-test.txt

      - name: Run Phase 12 smoke tier
        run: >
          make benchmark_phase12_smoke
          BENCHMARK_PHASE12_RAW_JSON=build/benchmark/phase12/raw/pytest-benchmark-${{ runner.os }}-smoke.json
          BENCHMARK_PHASE12_SUMMARY_JSON=build/benchmark/phase12/summary/phase12-${{ runner.os }}-smoke-full.json
          BENCHMARK_PHASE12_MANIFEST_JSON=build/benchmark/phase12/manifests/phase12-${{ runner.os }}-smoke-full-manifest.json

      - name: Upload smoke benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-smoke-${{ runner.os }}
          path: build/benchmark/phase12/
          if-no-files-found: error

  phase12-standard:
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tier == 'standard' }}
    name: phase12 standard (ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 180
    needs: benchmark-smoke

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt -r requirements-test.txt

      - name: Run Phase 12 standard tier
        run: make benchmark_phase12_standard

      - name: Upload Phase 12 standard artifacts
        uses: actions/upload-artifact@v4
        with:
          name: phase12-standard
          path: build/benchmark/phase12/
          if-no-files-found: error

  phase12-nightly:
    if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.tier == 'nightly') }}
    name: phase12 nightly (ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 240
    needs: benchmark-smoke

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt -r requirements-test.txt

      - name: Run Phase 12 nightly tier
        run: make benchmark_phase12_nightly

      - name: Upload Phase 12 nightly artifacts
        uses: actions/upload-artifact@v4
        with:
          name: phase12-nightly
          path: build/benchmark/phase12/
          if-no-files-found: error

  phase12-pressure:
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tier == 'pressure' }}
    name: phase12 pressure (ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt -r requirements-test.txt

      - name: Run Phase 12 pressure tier
        run: make benchmark_phase12_pressure

      - name: Upload Phase 12 pressure artifacts
        uses: actions/upload-artifact@v4
        with:
          name: phase12-pressure
          path: build/benchmark/phase12/
          if-no-files-found: error
